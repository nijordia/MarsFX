---
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-currency-pairs
  namespace: data-ingress
  labels:
    app: data-seeder
    data-type: currency-pairs
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: data-seeder
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-trino
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Trino..."
              until nc -z trino.data-trino.svc.cluster.local 8080; do
                echo "Trino not ready yet, waiting..."
                sleep 5
              done
              echo "Trino is ready!"
      containers:
        - name: seed-data
          image: marsfx-data-loader:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -c
            - |
              import trino
              import time

              print("=== Seeding Currency Pairs Reference Data ===")

              # Wait a bit for Trino to be fully ready
              time.sleep(10)

              conn = trino.dbapi.connect(
                  host='trino.data-trino.svc.cluster.local',
                  port=8080,
                  user='admin',
                  catalog='iceberg',
                  schema='fx_data'
              )
              cur = conn.cursor()

              # Create currency_pairs table if it doesn't exist
              create_table_sql = """
              CREATE TABLE IF NOT EXISTS iceberg.fx_data.currency_pairs (
                  base_currency VARCHAR,
                  quote_currency VARCHAR,
                  pair_symbol VARCHAR,
                  min_trade_size DECIMAL(18,8),
                  max_trade_size DECIMAL(18,8),
                  tick_size DECIMAL(18,8),
                  is_active BOOLEAN,
                  created_at TIMESTAMP(6) WITH TIME ZONE DEFAULT current_timestamp
              )
              """
              print("Creating currency_pairs table...")
              cur.execute(create_table_sql)

              # Insert currency pairs
              pairs = [
                  ('ECR', 'MRT', 'ECR/MRT', 0.01, 1000000.00, 0.0001, True),
                  ('ECR', 'LCR', 'ECR/LCR', 0.01, 1000000.00, 0.0001, True),
                  ('ECR', 'AMC', 'ECR/AMC', 0.01, 1000000.00, 0.0001, True),
                  ('MRT', 'LCR', 'MRT/LCR', 0.01, 1000000.00, 0.0001, True),
                  ('MRT', 'AMC', 'MRT/AMC', 0.01, 1000000.00, 0.0001, True),
                  ('LCR', 'AMC', 'LCR/AMC', 0.01, 1000000.00, 0.0001, True),
              ]

              print("Inserting currency pairs...")
              for pair in pairs:
                  insert_sql = f"""
                  INSERT INTO iceberg.fx_data.currency_pairs
                  (base_currency, quote_currency, pair_symbol, min_trade_size, max_trade_size, tick_size, is_active)
                  VALUES ('{pair[0]}', '{pair[1]}', '{pair[2]}', {pair[3]}, {pair[4]}, {pair[5]}, {pair[6]})
                  """
                  cur.execute(insert_sql)
                  print(f"  Inserted: {pair[2]}")

              # Verify
              cur.execute("SELECT * FROM iceberg.fx_data.currency_pairs")
              rows = cur.fetchall()
              print(f"\nVerification: Found {len(rows)} currency pairs")
              for row in rows:
                  print(f"  {row}")

              cur.close()
              conn.close()

              print("\n=== Currency Pairs Seeding Complete ===")
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
