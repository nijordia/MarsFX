---
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-economic-calendar
  namespace: data-ingress
  labels:
    app: data-seeder
    data-type: economic-calendar
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: data-seeder
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-trino
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Trino..."
              until nc -z trino.data-trino.svc.cluster.local 8080; do
                echo "Trino not ready yet, waiting..."
                sleep 5
              done
              echo "Trino is ready!"
      containers:
        - name: seed-data
          image: marsfx-data-loader:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -c
            - |
              import trino
              import time
              from datetime import datetime, timedelta

              print("=== Seeding Economic Calendar Reference Data ===")

              # Wait a bit for Trino to be fully ready
              time.sleep(10)

              conn = trino.dbapi.connect(
                  host='trino.data-trino.svc.cluster.local',
                  port=8080,
                  user='admin',
                  catalog='iceberg',
                  schema='fx_data'
              )
              cur = conn.cursor()

              # Create economic_calendar table if it doesn't exist
              create_table_sql = """
              CREATE TABLE IF NOT EXISTS iceberg.fx_data.economic_calendar (
                  event_id VARCHAR,
                  event_name VARCHAR,
                  event_type VARCHAR,
                  scheduled_timestamp TIMESTAMP(6) WITH TIME ZONE,
                  affected_currencies ARRAY(VARCHAR),
                  expected_impact VARCHAR,
                  description VARCHAR,
                  created_at TIMESTAMP(6) WITH TIME ZONE DEFAULT current_timestamp
              )
              """
              print("Creating economic_calendar table...")
              cur.execute(create_table_sql)

              # Generate sample events for the next 30 days
              print("Inserting economic events...")
              base_date = datetime.now()
              events = [
                  ('SOLAR_STORM_001', 'Major Solar Storm Warning', 'SOLAR_STORM',
                   base_date + timedelta(days=3), "ARRAY['MRT', 'AMC']", 'HIGH',
                   'Predicted solar storm may disrupt Mars-Asteroid communications'),

                  ('TARIFF_001', 'Earth Import Tariff Adjustment', 'TRADE_TARIFF',
                   base_date + timedelta(days=7), "ARRAY['ECR', 'MRT', 'LCR']", 'MEDIUM',
                   'Earth Council announces 5% tariff increase on Mars imports'),

                  ('MINING_STRIKE_001', 'Asteroid Miners Union Strike', 'MINING_STRIKE',
                   base_date + timedelta(days=10), "ARRAY['AMC']", 'HIGH',
                   'AMC production expected to drop 30% during strike period'),

                  ('POLICY_001', 'Lunar Central Bank Rate Decision', 'POLICY_CHANGE',
                   base_date + timedelta(days=14), "ARRAY['LCR', 'ECR']", 'MEDIUM',
                   'Lunar CB expected to raise interest rates by 25 bps'),

                  ('SUPPLY_SHOCK_001', 'Mars Water Ice Discovery', 'SUPPLY_SHOCK',
                   base_date + timedelta(days=21), "ARRAY['MRT']", 'CRITICAL',
                   'Major water ice discovery may boost Mars economy significantly'),
              ]

              for event in events:
                  timestamp_str = event[3].strftime('%Y-%m-%d %H:%M:%S')
                  insert_sql = f"""
                  INSERT INTO iceberg.fx_data.economic_calendar
                  (event_id, event_name, event_type, scheduled_timestamp, affected_currencies, expected_impact, description)
                  VALUES (
                      '{event[0]}',
                      '{event[1]}',
                      '{event[2]}',
                      TIMESTAMP '{timestamp_str}',
                      {event[4]},
                      '{event[5]}',
                      '{event[6]}'
                  )
                  """
                  cur.execute(insert_sql)
                  print(f"  Inserted: {event[1]} on {timestamp_str}")

              # Verify
              cur.execute("SELECT * FROM iceberg.fx_data.economic_calendar ORDER BY scheduled_timestamp")
              rows = cur.fetchall()
              print(f"\nVerification: Found {len(rows)} economic events")
              for row in rows:
                  print(f"  {row[1]} - {row[2]} - {row[5]}")

              cur.close()
              conn.close()

              print("\n=== Economic Calendar Seeding Complete ===")
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
