---
# Arroyo secrets for database and S3/MinIO access
apiVersion: v1
kind: Secret
metadata:
  name: arroyo-secrets
  namespace: data-arroyo
  labels:
    app: arroyo
type: Opaque
stringData:
  # PostgreSQL credentials (same as other services)
  POSTGRES_PASSWORD: "postgres"

  # MinIO credentials (matches storage deployment)
  S3_ACCESS_KEY_ID: "minioadmin"
  S3_SECRET_ACCESS_KEY: "minioadmin"

  # Optional: API authentication token
  # ARROYO_API_TOKEN: "changeme"
