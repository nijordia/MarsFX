---
# Kustomization for Arroyo stream processor
# Apply with: kubectl apply -k manifests/arroyo/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: data-arroyo

resources:
  - arroyo-configmap.yaml
  - arroyo-secrets.yaml
  - arroyo-init-job.yaml
  - arroyo-controller.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: marsfx
      app.kubernetes.io/component: arroyo
