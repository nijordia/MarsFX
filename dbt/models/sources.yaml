version: 2

sources:
  - name: fx_raw
    description: "Raw FX tick data from Kafka/Arroyo or batch-loaded from Parquet"
    database: iceberg
    schema: fx_data
    tables:
      - name: raw_ticks_streaming
        description: |
          Raw tick-level FX data for all currency pairs.
          Source: Kafka topic `marsfx.raw.ticks` → Arroyo → Iceberg
          Partitioned by day(transaction_timestamp)

        meta:
          owner: "data-engineering"
          contains_pii: false

        columns:
          - name: tick_id
            description: "Unique identifier for each tick (UUID)"
            tests:
              - unique
              - not_null

          - name: transaction_timestamp
            description: "Timestamp when the trade occurred (microsecond precision)"
            tests:
              - not_null

          - name: currency_pair
            description: "Currency pair symbol (e.g., ECR/MRT)"
            tests:
              - not_null
              - accepted_values:
                  values: ['ECR/MRT', 'ECR/LCR', 'ECR/AMC', 'MRT/LCR', 'MRT/AMC', 'LCR/AMC']

          - name: bid_price
            description: "Best bid price at transaction time"
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0.0001
                  max_value: 1000000
                  config:
                    severity: warn

          - name: ask_price
            description: "Best ask price at transaction time"
            tests:
              - not_null

          - name: mid_price
            description: "Mid price ((bid + ask) / 2)"
            tests:
              - not_null

          - name: spread_bps
            description: "Bid-ask spread in basis points"

          - name: trade_price
            description: "Actual execution price for this trade"
            tests:
              - not_null

          - name: volume
            description: "Trade volume/size"
            tests:
              - not_null

          - name: exchange_location
            description: "Exchange where the trade occurred"

          - name: trader_type
            description: "Type of market participant"

          - name: event_time
            description: "Kafka event timestamp"

        freshness:
          warn_after:
            count: 5
            period: minute
          error_after:
            count: 15
            period: minute
        loaded_at_field: event_time

      - name: economic_events
        description: "Economic events affecting FX markets (optional — created by seed-economic-calendar job)"
        columns:
          - name: event_id
            description: "Unique event identifier"
          - name: event_type
            description: "Type of economic event"
