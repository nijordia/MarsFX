# MarsFX Data Generator Configuration

kafka:
  bootstrap_servers: "localhost:9092"
  topics:
    ticks: "marsfx.raw.ticks"
    events: "marsfx.raw.events"
  # Kafka producer settings
  producer_config:
    compression.type: "lz4"
    linger.ms: 100
    batch.size: 16384
    acks: "all"  # Wait for all replicas (durability)
    retries: 3
    max.in.flight.requests.per.connection: 1  # Preserve ordering within partition
    enable.idempotence: true  # Exactly-once semantics

generator:
  # Tick generation rate (per currency pair)
  tick_rate_per_second: 10

  # Time acceleration (60 = 1 hour of data in 1 minute)
  time_acceleration_factor: 60

  # Economic event probability (per minute of simulated time)
  event_probability_per_minute: 0.05

  # Checkpoint interval (real seconds)
  checkpoint_interval_seconds: 60

  # Random seed for reproducibility (null for random)
  random_seed: 42

  # Simulation start date (null for current time)
  simulation_start_date: "2026-03-22T00:00:00Z"

output:
  # Enable/disable output destinations
  kafka_enabled: true
  parquet_enabled: true

  # Parquet file settings
  parquet_base_path: "data/ticks"
  parquet_partition_by: "date"  # or "hour"
  parquet_row_group_size: 10000

  # Checkpoint file path
  checkpoint_path: "data/checkpoints/generator_state.json"

currency_pairs:
  - name: "ECR/MRT"
    base_currency: "ECR"
    quote_currency: "MRT"
    base_price: 2.45
    volatility: 0.15  # Annual volatility (15%)
    min_spread_bps: 5  # Minimum spread in basis points
    max_spread_bps: 20
    typical_trade_size: 10000.0
    primary_exchange: "Mars_Central_Exchange"
    correlation_with:
      ECR/LCR: 0.6
      ECR/AMC: 0.4

  - name: "ECR/LCR"
    base_currency: "ECR"
    quote_currency: "LCR"
    base_price: 1.12
    volatility: 0.08
    min_spread_bps: 3
    max_spread_bps: 15
    typical_trade_size: 15000.0
    primary_exchange: "Lunar_Trading_Post"
    correlation_with:
      ECR/MRT: 0.6
      MRT/LCR: 0.5

  - name: "ECR/AMC"
    base_currency: "ECR"
    quote_currency: "AMC"
    base_price: 0.87
    volatility: 0.22
    min_spread_bps: 8
    max_spread_bps: 30
    typical_trade_size: 5000.0
    primary_exchange: "Asteroid_Market"
    correlation_with:
      ECR/MRT: 0.4
      ECR/LCR: 0.3

  - name: "MRT/LCR"
    base_currency: "MRT"
    quote_currency: "LCR"
    base_price: 0.46
    volatility: 0.12
    min_spread_bps: 5
    max_spread_bps: 18
    typical_trade_size: 12000.0
    primary_exchange: "Mars_Central_Exchange"
    correlation_with:
      ECR/LCR: 0.5
      ECR/MRT: -0.6  # Inverse correlation

  - name: "MRT/AMC"
    base_currency: "MRT"
    quote_currency: "AMC"
    base_price: 0.36
    volatility: 0.18
    min_spread_bps: 7
    max_spread_bps: 25
    typical_trade_size: 8000.0
    primary_exchange: "Asteroid_Market"
    correlation_with:
      ECR/AMC: 0.5
      MRT/LCR: 0.3

  - name: "LCR/AMC"
    base_currency: "LCR"
    quote_currency: "AMC"
    base_price: 0.78
    volatility: 0.14
    min_spread_bps: 6
    max_spread_bps: 22
    typical_trade_size: 9000.0
    primary_exchange: "Lunar_Trading_Post"
    correlation_with:
      ECR/AMC: 0.4
      MRT/AMC: 0.4

exchanges:
  - name: "Earth_FX_Hub"
    location: "Earth"
    operating_hours_utc: [6, 22]  # 6am - 10pm UTC
    base_volume_multiplier: 1.5

  - name: "Mars_Central_Exchange"
    location: "Mars"
    operating_hours_utc: [8, 20]
    base_volume_multiplier: 1.2

  - name: "Lunar_Trading_Post"
    location: "Moon"
    operating_hours_utc: [0, 23]  # Nearly 24/7
    base_volume_multiplier: 1.0

  - name: "Asteroid_Belt_Hub"
    location: "Asteroid Belt"
    operating_hours_utc: [10, 18]
    base_volume_multiplier: 0.8

trader_types:
  - type: "institutional"
    probability: 0.40
    trade_size_multiplier: [2.0, 5.0]  # 2x-5x typical size
    frequency_multiplier: 0.3  # Less frequent, larger trades

  - type: "retail"
    probability: 0.35
    trade_size_multiplier: [0.1, 0.5]
    frequency_multiplier: 1.2

  - type: "mining_corp"
    probability: 0.15
    trade_size_multiplier: [3.0, 8.0]
    frequency_multiplier: 0.2

  - type: "government"
    probability: 0.10
    trade_size_multiplier: [5.0, 10.0]
    frequency_multiplier: 0.1

economic_events:
  - type: "SOLAR_STORM"
    probability_weight: 0.25
    duration_minutes: [60, 240]  # 1-4 hours
    severity_range: [2, 5]
    effects:
      spread_multiplier: [1.5, 3.0]  # 50-200% increase
      volatility_multiplier: [2.0, 4.0]
      volume_multiplier: [0.5, 0.8]  # Lower volume
      affected_currencies: ["MRT", "AMC"]  # Space-based currencies

  - type: "TRADE_TARIFF"
    probability_weight: 0.20
    duration_minutes: [30, 120]
    severity_range: [1, 4]
    effects:
      price_shock_percent: [5, 30]  # Sudden price movement
      volatility_multiplier: [1.5, 2.5]
      volume_multiplier: [1.5, 2.5]  # Panic trading
      affected_currencies: ["ECR", "MRT", "LCR"]

  - type: "OXYGEN_CRISIS"
    probability_weight: 0.15
    duration_minutes: [120, 480]  # 2-8 hours
    severity_range: [3, 5]
    effects:
      price_shock_percent: [15, 50]
      volatility_multiplier: [3.0, 6.0]
      volume_multiplier: [2.0, 4.0]
      affected_currencies: ["MRT"]  # Mars-specific

  - type: "MINING_STRIKE"
    probability_weight: 0.20
    duration_minutes: [240, 720]  # 4-12 hours
    severity_range: [2, 4]
    effects:
      price_shock_percent: [10, 40]  # AMC supply shock
      volatility_multiplier: [2.0, 3.5]
      volume_multiplier: [1.2, 2.0]
      affected_currencies: ["AMC"]

  - type: "POLICY_CHANGE"
    probability_weight: 0.15
    duration_minutes: [60, 180]
    severity_range: [1, 3]
    effects:
      price_shock_percent: [3, 15]
      volatility_multiplier: [1.3, 2.0]
      volume_multiplier: [1.3, 1.8]
      affected_currencies: ["ECR", "LCR"]  # Central bank policies

  - type: "SUPPLY_SHOCK"
    probability_weight: 0.05
    duration_minutes: [180, 600]  # 3-10 hours
    severity_range: [3, 5]
    effects:
      price_shock_percent: [20, 60]  # Major discovery/shortage
      volatility_multiplier: [3.0, 5.0]
      volume_multiplier: [2.0, 3.5]
      affected_currencies: ["MRT", "AMC"]  # Resource-based

business_hours:
  # Volume multipliers by hour (UTC)
  # Simulates higher trading volume during Earth business hours
  volume_by_hour:
    0: 0.3   # Midnight UTC
    1: 0.2
    2: 0.2
    3: 0.2
    4: 0.3
    5: 0.4
    6: 0.6
    7: 0.8
    8: 1.0   # Business hours begin
    9: 1.2
    10: 1.3
    11: 1.4
    12: 1.5  # Peak trading
    13: 1.5
    14: 1.4
    15: 1.3
    16: 1.2
    17: 1.0
    18: 0.8
    19: 0.6
    20: 0.5
    21: 0.4
    22: 0.3
    23: 0.3
