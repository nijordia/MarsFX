apiVersion: v3.0.2
kind: DataContract
id: marsfx-raw-ticks
name: MarsFX Raw FX Ticks
version: 1.0.0
status: active
description:
  purpose: |
    Raw FX tick data serves as the canonical source for FX market activity.
    Produced by the MarsFX Python generator and streamed through Kafka.
  usage: |
    Internal analytics and OHLC aggregation. Source data for dbt transformations.
    Consumers must validate tick timing and price consistency before use.
  limitations: |
    Simulated data from MarsFX Python generator. Not real financial data.
    For demonstration and learning purposes only.

schema:
  - name: raw_ticks_streaming
    physicalType: TABLE
    description: Individual FX tick data points written by Arroyo from Kafka to Iceberg
    properties:
      - name: tick_id
        logicalType: string
        physicalType: UUID
        description: Unique identifier for each tick (UUID)
        required: true
        unique: true
        primaryKey: true
      - name: transaction_timestamp
        logicalType: date
        physicalType: TIMESTAMP
        description: Timestamp when the trade occurred (microsecond precision)
        required: true
      - name: currency_pair
        logicalType: string
        physicalType: VARCHAR
        description: Currency pair symbol
        required: true
        examples:
          - ECR/MRT
          - ECR/LCR
          - MRT/AMC
      - name: bid_price
        logicalType: number
        physicalType: DOUBLE
        description: Best bid price at transaction time
        required: true
      - name: ask_price
        logicalType: number
        physicalType: DOUBLE
        description: Best ask price at transaction time
        required: true
      - name: mid_price
        logicalType: number
        physicalType: DOUBLE
        description: Mid price ((bid + ask) / 2)
        required: true
      - name: spread_bps
        logicalType: number
        physicalType: DOUBLE
        description: Bid-ask spread in basis points
        required: false
      - name: trade_price
        logicalType: number
        physicalType: DOUBLE
        description: Actual execution price
        required: true
      - name: volume
        logicalType: number
        physicalType: DOUBLE
        description: Trade volume/size
        required: true
      - name: exchange_location
        logicalType: string
        physicalType: VARCHAR
        description: Exchange where the trade occurred
        required: false
        examples:
          - Earth_FX_Hub
          - Mars_Central_Exchange
      - name: trader_type
        logicalType: string
        physicalType: VARCHAR
        description: Type of market participant
        required: false
        examples:
          - institutional
          - retail
          - mining_corp
      - name: event_time
        logicalType: date
        physicalType: TIMESTAMP
        description: Kafka event timestamp (used for freshness SLA)
        required: false

servers:
  - server: kafka
    type: kafka
    host: localhost:9092
    topic: marsfx.raw.ticks
    format: json
    description: Source Kafka topic for raw tick events
  - server: trino
    type: trino
    host: localhost
    port: 8080
    catalog: iceberg
    schema: fx_data
    description: Iceberg table location in Trino for query and validation

team:
  - name: data-engineering
    description: MarsFX Data Engineering Team
    members:
      - username: data-eng@marsfx.local
        role: owner

slaProperties:
  - property: availability
    value: "95"
    unit: percent
    description: Ticks flowing into Kafka and landing in Iceberg
  - property: freshness
    value: "15"
    unit: minutes
    description: Data freshness SLA - warn at 5min, error at 15min
  - property: retention
    value: "365"
    unit: days
    description: Keep raw tick data for 1 year

tags:
  - fx-market
  - real-time
  - streaming
