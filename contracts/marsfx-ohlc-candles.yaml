apiVersion: v3.0.2
kind: DataContract
id: marsfx-ohlc-candles
name: MarsFX OHLC Candle Aggregations
version: 1.0.0
status: active
description:
  purpose: |
    OHLC candles serve as the primary data product for time-series analysis.
    Built from raw tick data via dbt staging and mart transformations.
  usage: |
    Internal analytics dashboards, reporting, and time-series analysis.
    Consumers must respect candle granularity and lookback windows.
  limitations: |
    Derived from simulated MarsFX tick data. Not real financial data.
    For demonstration and learning purposes only.

schema:
  - name: ohlc_candles_1min
    physicalType: TABLE
    description: 1-minute OHLC candles aggregated from raw FX tick data
    properties:
      - name: candle_timestamp
        logicalType: date
        physicalType: TIMESTAMP
        description: Start of the 1-minute candle period
        required: true
        primaryKey: true
      - name: currency_pair
        logicalType: string
        physicalType: VARCHAR
        description: Currency pair symbol
        required: true
        primaryKey: true
        examples:
          - ECR/MRT
          - MRT/LCR
      - name: open_price
        logicalType: number
        physicalType: DOUBLE
        description: First trade price in the candle period
        required: true
      - name: high_price
        logicalType: number
        physicalType: DOUBLE
        description: Highest trade price in the candle period
        required: true
      - name: low_price
        logicalType: number
        physicalType: DOUBLE
        description: Lowest trade price in the candle period
        required: true
      - name: close_price
        logicalType: number
        physicalType: DOUBLE
        description: Last trade price in the candle period
        required: true
      - name: total_volume
        logicalType: number
        physicalType: DOUBLE
        description: Sum of all trade volumes in the candle period
        required: true
      - name: trade_count
        logicalType: integer
        physicalType: BIGINT
        description: Number of trades in the candle period
        required: true
      - name: avg_spread_bps
        logicalType: number
        physicalType: DOUBLE
        description: Average bid-ask spread in basis points
        required: false
      - name: volatility_pct
        logicalType: number
        physicalType: DOUBLE
        description: Intra-period volatility ((high - low) / open * 100)
        required: false
      - name: calculated_at
        logicalType: date
        physicalType: TIMESTAMP
        description: Timestamp when this candle was calculated
        required: true

  - name: ohlc_candles_5min
    physicalType: TABLE
    description: 5-minute OHLC candles aggregated from raw FX tick data
    properties:
      - name: candle_timestamp
        logicalType: date
        physicalType: TIMESTAMP
        required: true
        primaryKey: true
      - name: currency_pair
        logicalType: string
        physicalType: VARCHAR
        required: true
        primaryKey: true
      - name: open_price
        logicalType: number
        physicalType: DOUBLE
        required: true
      - name: high_price
        logicalType: number
        physicalType: DOUBLE
        required: true
      - name: low_price
        logicalType: number
        physicalType: DOUBLE
        required: true
      - name: close_price
        logicalType: number
        physicalType: DOUBLE
        required: true
      - name: total_volume
        logicalType: number
        physicalType: DOUBLE
        required: true
      - name: trade_count
        logicalType: integer
        physicalType: BIGINT
        required: true
      - name: calculated_at
        logicalType: date
        physicalType: TIMESTAMP
        required: true

  - name: ohlc_candles_1h
    physicalType: TABLE
    description: 1-hour OHLC candles aggregated from raw FX tick data
    properties:
      - name: candle_timestamp
        logicalType: date
        physicalType: TIMESTAMP
        required: true
        primaryKey: true
      - name: currency_pair
        logicalType: string
        physicalType: VARCHAR
        required: true
        primaryKey: true
      - name: open_price
        logicalType: number
        physicalType: DOUBLE
        required: true
      - name: high_price
        logicalType: number
        physicalType: DOUBLE
        required: true
      - name: low_price
        logicalType: number
        physicalType: DOUBLE
        required: true
      - name: close_price
        logicalType: number
        physicalType: DOUBLE
        required: true
      - name: total_volume
        logicalType: number
        physicalType: DOUBLE
        required: true
      - name: trade_count
        logicalType: integer
        physicalType: BIGINT
        required: true
      - name: calculated_at
        logicalType: date
        physicalType: TIMESTAMP
        required: true

  - name: ohlc_candles_1d
    physicalType: TABLE
    description: Daily OHLC candles aggregated from raw FX tick data
    properties:
      - name: candle_timestamp
        logicalType: date
        physicalType: TIMESTAMP
        required: true
        primaryKey: true
        description: Start of the daily candle period (midnight)
      - name: currency_pair
        logicalType: string
        physicalType: VARCHAR
        required: true
        primaryKey: true
      - name: open_price
        logicalType: number
        physicalType: DOUBLE
        required: true
      - name: high_price
        logicalType: number
        physicalType: DOUBLE
        required: true
      - name: low_price
        logicalType: number
        physicalType: DOUBLE
        required: true
      - name: close_price
        logicalType: number
        physicalType: DOUBLE
        required: true
      - name: total_volume
        logicalType: number
        physicalType: DOUBLE
        required: true
      - name: trade_count
        logicalType: integer
        physicalType: BIGINT
        required: true
      - name: calculated_at
        logicalType: date
        physicalType: TIMESTAMP
        required: true

servers:
  - server: trino
    type: trino
    host: localhost
    port: 8080
    catalog: iceberg
    schema: fx_data
    description: Iceberg tables in Trino for OHLC candle queries

team:
  - name: data-engineering
    description: MarsFX Data Engineering Team (dbt maintainers)
    members:
      - username: data-eng@marsfx.local
        role: owner

slaProperties:
  - property: availability
    value: "95"
    unit: percent
    description: OHLC candles queryable in Trino after dbt run
  - property: freshness
    value: "10"
    unit: minutes
    description: 1-min candles should be no more than 10 minutes stale
  - property: retention
    value: "365"
    unit: days
    description: Keep OHLC candle data for 1 year

tags:
  - fx-market
  - ohlc
  - aggregated
  - analytics
