        - name: volatility_pct
          dataType: double
          required: false
        - name: calculated_at
          dataType: timestamp
          required: true

quality:
  type: SodaCL
  specification:
    checks for ohlc_candles_1min:
      - row_count > 0
      - invalid_count(low_price <= high_price) = 0
      - invalid_count(low_price <= open_price) = 0
      - invalid_count(low_price <= close_price) = 0
      - invalid_count(high_price >= open_price) = 0
    checks for ohlc_candles_5min:
      - row_count > 0
      - invalid_count(low_price <= high_price) = 0
    checks for ohlc_candles_1h:
      - row_count > 0
      - invalid_count(low_price <= high_price) = 0
    checks for ohlc_candles_1d:
      - row_count > 0
      - invalid_count(low_price <= high_price) = 0

sla:
  availability:
    percentage: "95.0%"
    description: OHLC candles queryable in Trino after dbt run
  freshness:
    threshold: 600s
    timestampField: calculated_at
    description: |
      1-min candles should be no more than 10 minutes stale.
      Higher granularities have proportionally longer thresholds:
      5min: 30min, 1h: 2h, 1d: 25h.
  retention:
    period: 365d
    description: Keep OHLC candle data for 1 year

servers:
  trino:
    type: trino
    host: localhost
    port: 8080
    protocol: http
    catalog: iceberg
    schema: fx_data
    description: Iceberg tables in Trino for OHLC candle queries

terms:
  purpose: |
    OHLC candles serve as the primary data product for time-series analysis.
    Used for trend detection, volatility analysis, and market reporting.
  usage: |
    Internal analytics dashboards, reporting, and time-series analysis.
    Consumers must respect candle granularity and lookback windows.
  limitations: |
    Derived from simulated MarsFX tick data. Not real financial data.
    For demonstration and learning purposes only.
  expiration: null

team:
  - name: data-engineering
    role: owner
    description: MarsFX Data Engineering Team (dbt maintainers)
    contact: data-eng@marsfx.local
  - name: analytics
    role: consumer
    description: Analytics team consuming OHLC data for reporting
  - name: trading
    role: consumer
    description: Trading team consuming live candle data for alerts
