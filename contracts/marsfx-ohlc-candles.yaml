dataContractSpecification: 3.1.0
id: marsfx-ohlc-candles
info:
  title: MarsFX OHLC Candle Aggregations
  version: 1.0.0
  description: |
    OHLC (Open-High-Low-Close) price candles at 1min, 5min, 1h, and 1d granularities.
    Built from raw tick data via dbt staging and mart transformations.

    Source: iceberg.fx_data.raw_ticks_streaming → stg_fx_ticks → ohlc_candles_*

    This contract defines the interface between the analytics domain (dbt transformations)
    and downstream consumers (dashboards, reports, APIs). Consumers can rely on the schema,
    quality rules (OHLC validity), and freshness guarantees defined here.
  owner: data-engineering
  contact:
    name: MarsFX Data Engineering
  status: active

schema:
  tables:
    - name: ohlc_candles_1min
      description: 1-minute OHLC candles aggregated from raw FX tick data
      type: table
      columns:
        - name: candle_timestamp
          dataType: timestamp
          required: true
          description: Start of the 1-minute candle period (truncated to minute)
        - name: currency_pair
          dataType: string
          required: true
          enum:
            - ECR/MRT
            - ECR/LCR
            - ECR/AMC
            - MRT/LCR
            - MRT/AMC
            - LCR/AMC
          description: Currency pair symbol
        - name: base_currency
          dataType: string
          required: true
          description: Base currency code (first in pair)
        - name: quote_currency
          dataType: string
          required: true
          description: Quote currency code (second in pair)
        - name: open_price
          dataType: double
          required: true
          description: First trade price in the candle period
        - name: high_price
          dataType: double
          required: true
          description: Highest trade price in the candle period
        - name: low_price
          dataType: double
          required: true
          description: Lowest trade price in the candle period
        - name: close_price
          dataType: double
          required: true
          description: Last trade price in the candle period
        - name: total_volume
          dataType: double
          required: true
          description: Sum of all trade volumes in the candle period
        - name: trade_count
          dataType: long
          required: true
          description: Number of trades in the candle period
        - name: avg_spread_bps
          dataType: double
          required: false
          description: Average bid-ask spread in basis points
        - name: price_change
          dataType: double
          required: false
          description: Absolute price change (close - open)
        - name: price_change_pct
          dataType: double
          required: false
          description: Percentage price change ((close - open) / open * 100)
        - name: volatility_pct
          dataType: double
          required: false
          description: Intra-period volatility ((high - low) / open * 100)
        - name: calculated_at
          dataType: timestamp
          required: true
          description: Timestamp when this candle was calculated

    - name: ohlc_candles_5min
      description: 5-minute OHLC candles aggregated from raw FX tick data
      type: table
      columns:
        - name: candle_timestamp
          dataType: timestamp
          required: true
        - name: currency_pair
          dataType: string
          required: true
          enum:
            - ECR/MRT
            - ECR/LCR
            - ECR/AMC
            - MRT/LCR
            - MRT/AMC
            - LCR/AMC
        - name: base_currency
          dataType: string
          required: true
        - name: quote_currency
          dataType: string
          required: true
        - name: open_price
          dataType: double
          required: true
        - name: high_price
          dataType: double
          required: true
        - name: low_price
          dataType: double
          required: true
        - name: close_price
          dataType: double
          required: true
        - name: total_volume
          dataType: double
          required: true
        - name: trade_count
          dataType: long
          required: true
        - name: avg_spread_bps
          dataType: double
          required: false
        - name: price_change
          dataType: double
          required: false
        - name: price_change_pct
          dataType: double
          required: false
        - name: volatility_pct
          dataType: double
          required: false
        - name: calculated_at
          dataType: timestamp
          required: true

    - name: ohlc_candles_1h
      description: 1-hour OHLC candles aggregated from raw FX tick data
      type: table
      columns:
        - name: candle_timestamp
          dataType: timestamp
          required: true
        - name: currency_pair
          dataType: string
          required: true
          enum:
            - ECR/MRT
            - ECR/LCR
            - ECR/AMC
            - MRT/LCR
            - MRT/AMC
            - LCR/AMC
        - name: base_currency
          dataType: string
          required: true
        - name: quote_currency
          dataType: string
          required: true
        - name: open_price
          dataType: double
          required: true
        - name: high_price
          dataType: double
          required: true
        - name: low_price
          dataType: double
          required: true
        - name: close_price
          dataType: double
          required: true
        - name: total_volume
          dataType: double
          required: true
        - name: trade_count
          dataType: long
          required: true
        - name: avg_spread_bps
          dataType: double
          required: false
        - name: price_change
          dataType: double
          required: false
        - name: price_change_pct
          dataType: double
          required: false
        - name: volatility_pct
          dataType: double
          required: false
        - name: calculated_at
          dataType: timestamp
